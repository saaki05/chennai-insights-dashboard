services:
  - type: web
    name: chennai-pulse-dashboard
    runtime: python
    plan: free
    region: singapore
    branch: main
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/meta
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
